services:
  - type: web
    name: hgss-school
    runtime: static
    rootDir: artifacts/hgss-school
    buildCommand: corepack enable && corepack prepare pnpm@10.15.0 --activate && pnpm install --frozen-lockfile && pnpm build
    staticPublishPath: dist/public
    pullRequestPreviewsEnabled: true
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: BASE_PATH
        value: /
